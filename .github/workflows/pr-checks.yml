name: PR Checks

on: pull_request

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for relevant changes
        uses: ./.github/actions/detect-build-changes
        id: changes
      - if: ${{ steps.changes.outputs.run_ci == 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 22
      - if: ${{ steps.changes.outputs.run_ci == 'true' }}
        name: Build artifact
        run: |
          chmod +x ./gradlew
          ./gradlew assemble --no-daemon
      - if: ${{ steps.changes.outputs.run_ci == 'false' }}
        name: Skip build
        run: echo "Skipping build"

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for relevant changes
        uses: ./.github/actions/detect-build-changes
        id: changes
      - if: ${{ steps.changes.outputs.run_ci == 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 22
      - if: ${{ steps.changes.outputs.run_ci == 'true' }}
        name: Run tests
        run: |
          echo "SPRING_PROFILES_ACTIVE=test" >> $GITHUB_ENV
          chmod +x ./gradlew
          ./gradlew test --no-daemon
      - if: ${{ steps.changes.outputs.run_ci == 'false' }}
        name: Skip tests
        run: echo "Skipping tests"

  spotless:
    name: Spotless Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for relevant changes
        uses: ./.github/actions/detect-build-changes
        id: changes
      - if: ${{ steps.changes.outputs.run_ci == 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 22
      - if: ${{ steps.changes.outputs.run_ci == 'true' }}
        name: Run spotless check
        run: |
          chmod +x ./gradlew
          ./gradlew spotlessCheck --no-daemon
      - if: ${{ steps.changes.outputs.run_ci == 'false' }}
        name: Skip spotless
        run: echo "Skipping spotless check"